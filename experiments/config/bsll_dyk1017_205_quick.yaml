# Fast descriptor smoke-test configuration for the BSLL / DyK1017+205 case.

case:
  id: "bsll_dyk1017_205_quick"
  tunnel: "BSLL"
  start_chainage: "DyK1017+205"
  description: "Quick descriptor smoke-test run for BSLL."

data:
  tsp_path: "data/raw/tsp.csv"
  monitoring_path: "data/raw/monitoring.csv"
  processed_dir: "data/processed/bsll_dyk1017_205"

excavation:
  step_length: 1.0
  cutterhead_look_ahead: 5.0
  advance_direction: [1, 0, 0]

tbm_geometry:
  cutterhead_radius: 4.0
  shield_radius: 3.95
  shield_length: 10.0
  front_shield_len: 3.0
  middle_shield_len: 3.5
  tail_shield_len: 3.5
  surface_resolution: 0.8

graph:
  tau_zone: 5.0
  tau_edge: 2.0
  normal_threshold: 0.3

model:
  history_window: 5
  predict_horizon: 1

training:
  batch_size: 32

split:
  method: "mileage"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
