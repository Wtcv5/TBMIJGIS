# Fast smoke-test configuration for the SJLS / Dyk1252+411 case.

case:
  id: "sjls_dyk1252_411_quick"
  tunnel: "SJLS"
  start_chainage: "Dyk1252+411"
  description: "Quick smoke-test run for SJLS before formal training."

seed: 42

data:
  tsp_path: "data/processed/sjls_dyk1252_411/tsp_sjls_dyk1252_411.csv"
  monitoring_path: "data/processed/sjls_dyk1252_411/monitoring_sjls_dyk1252_411.csv"
  processed_dir: "data/processed/sjls_dyk1252_411"

excavation:
  step_length: 1.0
  cutterhead_look_ahead: 5.0
  advance_direction: [1, 0, 0]

tbm_geometry:
  cutterhead_radius: 4.0
  shield_radius: 3.95
  shield_length: 10.0
  front_shield_len: 3.0
  middle_shield_len: 3.5
  tail_shield_len: 3.5
  surface_resolution: 1.2

graph:
  tau_zone: 5.0
  tau_edge: 2.0
  normal_threshold: 0.3

model:
  history_window: 5
  predict_horizon: 3
  rock_node_dim: 16
  tbm_node_dim: 16
  edge_dim: 16
  gnn_layers: 1
  gru_hidden_dim: 32
  gru_layers: 1
  dropout: 0.25
  residual_prediction: true

training:
  batch_size: 32
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.005
  patience: 3
  huber_delta: 1.0

split:
  method: "mileage"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

runtime:
  output_dir: "outputs/sjls_dyk1252_411_quick"
  device: "auto"
  cache_graph_sequence: true
  calibrate_residual_blend: true
  run_ablations: false
  enable_a4: false
  bootstrap_samples: 0
  permutation_samples: 0
  xgb_n_estimators: 20
  xgb_max_depth: 2
