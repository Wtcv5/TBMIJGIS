seed: 42
data:
  tsp_path: data/raw/tsp.csv
  monitoring_path: data/raw/monitoring.csv
  processed_dir: data/processed
excavation:
  step_length: 1.0
  cutterhead_look_ahead: 5.0
  advance_direction:
  - 1
  - 0
  - 0
tbm_geometry:
  cutterhead_radius: 4.0
  shield_radius: 3.95
  shield_length: 10.0
  front_shield_len: 3.0
  middle_shield_len: 3.5
  tail_shield_len: 3.5
  surface_resolution: 0.5
graph:
  tau_zone: 5.0
  tau_edge: 2.5
  distance_threshold: 2.5
  normal_threshold: 0.35
model:
  history_window: 5
  predict_horizon: 1
  rock_node_dim: 32
  tbm_node_dim: 32
  edge_dim: 32
  gnn_layers: 2
  gru_hidden_dim: 64
  gru_layers: 1
  dropout: 0.25
training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.005
  patience: 4
  huber_delta: 1.0
split:
  method: stratified
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  n_strata: 4
metrics:
- mae
- rmse
- r2
- pearson
- spearman
scenarios:
  high_thrust_percentile: 80
  high_torque_percentile: 80
  low_penetration_percentile: 20
  low_advance_rate_percentile: 20
runtime:
  output_dir: outputs/search/s42_balanced_tau25_eta35
  run_ablations: false
  run_relaxed_ablation: false
  bootstrap_samples: 0
  permutation_samples: 0
  xgb_n_estimators: 100
  xgb_max_depth: 4
  use_augmentation: false
