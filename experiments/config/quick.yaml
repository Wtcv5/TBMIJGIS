# Fast smoke-test configuration for debugging code paths and figure style.
# Do not use metrics from this config as final paper evidence.

seed: 42

data:
  tsp_path: "data/raw/tsp.csv"
  monitoring_path: "data/raw/monitoring.csv"
  processed_dir: "data/processed"

excavation:
  step_length: 1.0
  cutterhead_look_ahead: 5.0
  advance_direction: [1, 0, 0]

tbm_geometry:
  cutterhead_radius: 4.0
  shield_radius: 3.95
  shield_length: 10.0
  front_shield_len: 3.0
  middle_shield_len: 3.5
  tail_shield_len: 3.5
  surface_resolution: 0.4

graph:
  distance_threshold: 2.0
  normal_threshold: 0.3

model:
  history_window: 5
  predict_horizon: 1
  rock_node_dim: 48
  tbm_node_dim: 32
  edge_dim: 32
  gnn_layers: 1
  gru_hidden_dim: 64
  gru_layers: 1
  dropout: 0.1

training:
  batch_size: 32
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 3
  huber_delta: 1.0

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

metrics:
  - mae
  - rmse
  - r2
  - pearson
  - spearman

scenarios:
  high_thrust_percentile: 80
  high_torque_percentile: 80
  low_penetration_percentile: 20
  low_advance_rate_percentile: 20

runtime:
  output_dir: "outputs/mvp4_quick"
  run_ablations: false
  bootstrap_samples: 0
  permutation_samples: 0
  xgb_n_estimators: 30
  xgb_max_depth: 3
