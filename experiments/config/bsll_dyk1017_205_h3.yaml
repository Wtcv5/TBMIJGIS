# BSLL tunnel case starting from DyK1017+205 with a 3-step prediction horizon.
#
# This is the preferred BSLL prediction setting when the goal is advance
# warning rather than one-step persistence matching.

case:
  id: "bsll_dyk1017_205_h3"
  tunnel: "BSLL"
  start_chainage: "DyK1017+205"
  description: "BSLL tunnel case with h=3 advance response prediction."
  tsp_source: "experiments/data/raw/tsp.csv"
  monitoring_source: "experiments/data/raw/monitoring.csv"

seed: 42

data:
  tsp_path: "data/raw/tsp.csv"
  monitoring_path: "data/raw/monitoring.csv"
  processed_dir: "data/processed/bsll_dyk1017_205"

excavation:
  step_length: 1.0
  cutterhead_look_ahead: 5.0
  advance_direction: [1, 0, 0]

tbm_geometry:
  cutterhead_radius: 4.0
  shield_radius: 3.95
  shield_length: 10.0
  front_shield_len: 3.0
  middle_shield_len: 3.5
  tail_shield_len: 3.5
  surface_resolution: 0.5

graph:
  tau_zone: 5.0
  tau_edge: 2.0
  normal_threshold: 0.3

model:
  history_window: 5
  predict_horizon: 3
  rock_node_dim: 32
  tbm_node_dim: 32
  edge_dim: 32
  gnn_layers: 2
  gru_hidden_dim: 64
  gru_layers: 1
  dropout: 0.3
  residual_prediction: true

training:
  batch_size: 32
  epochs: 80
  learning_rate: 0.001
  weight_decay: 0.01
  patience: 15
  huber_delta: 1.0
  target_weights: [1.0, 1.2, 1.8, 1.0, 1.4]

split:
  method: "mileage"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

metrics:
  - mae
  - rmse
  - r2
  - pearson
  - spearman

scenarios:
  high_thrust_percentile: 80
  high_torque_percentile: 80
  low_penetration_percentile: 20
  low_advance_rate_percentile: 20

runtime:
  output_dir: "outputs/bsll_dyk1017_205_h3"
  device: "auto"
  cache_graph_sequence: true
  calibrate_residual_blend: true
  run_ablations: true
  run_relaxed_ablation: false
  bootstrap_samples: 300
  permutation_samples: 2000
  xgb_n_estimators: 100
  xgb_max_depth: 4
