# Response-Supervised Geometry-Constrained Rock-TBM Graph Sequence — Experiment Config

# Random seed for reproducibility
seed: 42

# Data paths
data:
  tsp_path: "data/raw/tsp.csv"
  monitoring_path: "data/raw/monitoring.csv"
  processed_dir: "data/processed"

# Excavation step parameters
excavation:
  step_length: 1.0            # chainage aggregation step (m), increased from 0.5 for faster training
  cutterhead_look_ahead: 5.0  # 刀盘前方 active zone 深度 (m)
  advance_direction: [1, 0, 0]  # advance direction (X-axis)

# TBM parametric geometry
tbm_geometry:
  cutterhead_radius: 4.0
  shield_radius: 3.95
  shield_length: 10.0
  front_shield_len: 3.0
  middle_shield_len: 3.5
  tail_shield_len: 3.5
  surface_resolution: 0.5     # surface node sampling resolution (m), increased from 0.2 for faster training

# Graph construction
graph:
  tau_zone: 5.0               # active zone radial extent (m), ~1.25× tunnel diameter
                              # physical meaning: stress redistribution influence zone
  tau_edge: 2.0               # rock-machine candidate edge distance threshold (m)
                              # physical meaning: near-field interaction distance
  normal_threshold: 0.3       # eta_min: signed-normal compatibility threshold

# Model architecture
model:
  history_window: 5           # K: number of past graph snapshots
  predict_horizon: 1          # h: prediction step ahead
  rock_node_dim: 32           # reduced from 128 to prevent overfitting (~28 train samples)
  tbm_node_dim: 32            # reduced from 64
  edge_dim: 32                # reduced from 64
  gnn_layers: 2               # reduced from 3
  gru_hidden_dim: 64          # reduced from 256
  gru_layers: 1               # reduced from 2
  dropout: 0.3                # increased from 0.1

# Training
training:
  batch_size: 32
  epochs: 80                # reduced from 200; early stopping handles early termination
  learning_rate: 0.001
  weight_decay: 0.01        # increased from 0.0001 for regularization
  patience: 15              # reduced from 30 for faster convergence
  huber_delta: 1.0

# Mileage-ordered split (DO NOT shuffle)
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

# Evaluation metrics
metrics:
  - mae
  - rmse
  - r2
  - pearson
  - spearman

# Scenario evaluation percentile thresholds
scenarios:
  high_thrust_percentile: 80
  high_torque_percentile: 80
  low_penetration_percentile: 20
  low_advance_rate_percentile: 20

# Runtime controls for formal runs
runtime:
  output_dir: "outputs/mvp4"
  run_ablations: true
  run_relaxed_ablation: false   # NoGeometricConstraints: requires rebuilding graph sequence (slow)
  bootstrap_samples: 300      # reduced from 1000 for CPU speed
  permutation_samples: 2000   # reduced from 10000 for CPU speed
  xgb_n_estimators: 100       # reduced from 200 (XGBoost is fast anyway)
  xgb_max_depth: 4            # reduced from 6
